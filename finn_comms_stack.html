<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FINN Customer Communication Stack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #F0F2F5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 20px; }
    .diagram-wrapper {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.09);
      padding: 28px;
      overflow-x: auto;
      max-width: 100%;
    }
    .legend {
      display: flex;
      gap: 24px;
      margin-top: 14px;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #666;
    }
    .tooltip {
      position: fixed;
      background: #1a1a1a;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      z-index: 100;
      max-width: 220px;
      line-height: 1.5;
      display: none;
    }
  </style>
</head>
<body>
  <h1>FINN Customer Communication Stack</h1>
  <p class="subtitle">Click any node to highlight its connections · Solid arrows = active triggers · Dashed = data feeds</p>
  <div class="diagram-wrapper">
    <svg id="diagram" width="1080" height="520" viewBox="0 0 1080 520"></svg>
  </div>
  <div class="legend">
    <div class="legend-item">
      <svg width="36" height="14">
        <line x1="0" y1="7" x2="26" y2="7" stroke="#555" stroke-width="2"/>
        <polygon points="24,3 34,7 24,11" fill="#555"/>
      </svg>
      Active trigger / send
    </div>
    <div class="legend-item">
      <svg width="36" height="14">
        <line x1="0" y1="7" x2="26" y2="7" stroke="#555" stroke-width="2" stroke-dasharray="5,3"/>
        <polygon points="24,3 34,7 24,11" fill="#555"/>
      </svg>
      Data feed / sync
    </div>
  </div>
  <div class="tooltip" id="tooltip"></div>

<script>
const nodes = [
  {
    id: "gsheets", label: "Google Sheets", sub: "Manual data source",
    x: 30, y: 60, w: 138, h: 48,
    color: "#34A853", bg: "#E8F5E9",
    details: "Holds customer lists that Make scenarios read to bulk-enroll users into Braze Canvases."
  },
  {
    id: "bigquery", label: "BigQuery / DWH", sub: "Data warehouse",
    x: 30, y: 390, w: 138, h: 48,
    color: "#4285F4", bg: "#EAF1FE",
    details: "Central data warehouse. Receives operational & comms data from NocoDB, feeds deal/subscription data into Segment."
  },
  {
    id: "nocodb", label: "NocoDB (Finnoco)", sub: "Comms register & ops DB",
    x: 250, y: 225, w: 138, h: 48,
    color: "#E67E22", bg: "#FEF5EC",
    details: "Receives communication records written back by Make after each scenario runs — covering both Braze Canvas enrollments and SendGrid sends. Used to prevent duplicate sends. Also stores fleet/ops data. Feeds into BigQuery."
  },
  {
    id: "segment", label: "Segment", sub: "Customer data platform",
    x: 250, y: 390, w: 138, h: 48,
    color: "#52BD94", bg: "#E8F8F2",
    details: "Collects web & app events. Receives event triggers from Make (e.g. Order Complete). Routes user profiles and events into Braze."
  },
  {
    id: "hubspot", label: "HubSpot", sub: "CRM & marketing email",
    x: 470, y: 30, w: 138, h: 48,
    color: "#FF7A59", bg: "#FFF1ED",
    details: "Source of truth for Contacts & Deals. Sends marketing emails directly. Triggers Make scenarios on deal stage changes. Syncs deal/contact data into Braze. Also receives triggers back from Make — Make can trigger HubSpot workflows and send automated emails via the HubSpot API."
  },
  {
    id: "make", label: "Make (Integromat)", sub: "Workflow automation",
    x: 470, y: 225, w: 138, h: 48,
    color: "#6B4FBB", bg: "#F0EBFF",
    details: "finn.integromat.cloud. Triggered by HubSpot on deal stage changes, or reads from Google Sheets. Enrolls users into Braze Canvases via REST API, fires events to Segment, triggers HubSpot workflows and sends emails via HubSpot API, triggers SendGrid for attachment emails, and writes all communication logs back to NocoDB (for deduplication)."
  },
  {
    id: "sendgrid", label: "SendGrid", sub: "Attachment emails",
    x: 470, y: 420, w: 138, h: 48,
    color: "#1A82E2", bg: "#E8F3FD",
    details: "Triggered by Make scenarios to send attachment emails. NocoDB logs each send to prevent duplicates. Templates designed in Stripo and exported to SendGrid."
  },
  {
    id: "braze", label: "Braze", sub: "Engagement platform",
    x: 700, y: 110, w: 138, h: 48,
    color: "#2962FF", bg: "#E8EEFF",
    details: "Central engagement platform. Receives deal data from HubSpot and user events from Segment. Sends push notifications via the FINN App SDK and transactional emails to customers."
  },
  {
    id: "app", label: "FINN App", sub: "iOS & Android (React Native)",
    x: 700, y: 360, w: 138, h: 48,
    color: "#00A86B", bg: "#E6FAF4",
    details: "Mobile app. Braze SDK embedded for push token management. Sends app events back to Segment. Receives push notifications from Braze."
  },
  {
    id: "customer", label: "Customer", sub: "End recipient",
    x: 920, y: 240, w: 130, h: 48,
    color: "#7B2D8B", bg: "#F3E8FA",
    details: "Receives: marketing emails (HubSpot), transactional emails (Braze), push notifications (Braze via App), and attachment emails (SendGrid)."
  },
];

// cx, cy = center of node
nodes.forEach(n => { n.cx = n.x + n.w/2; n.cy = n.y + n.h/2; });

const nodeById = {};
nodes.forEach(n => nodeById[n.id] = n);

const edges = [
  // gsheets → make
  {
    from: "gsheets", to: "make",
    label: "customer lists",
    d: "M 168,84 C 320,84 320,249 470,249",
    lx: 282, ly: 152, dashed: false
  },
  // bigquery → segment
  {
    from: "bigquery", to: "segment",
    label: "deal/subscription data",
    d: "M 168,414 L 250,414",
    lx: 172, ly: 404, dashed: true
  },
  // nocodb → bigquery
  {
    from: "nocodb", to: "bigquery",
    label: "comms & ops data",
    d: "M 319,273 C 319,340 99,340 99,390",
    lx: 186, ly: 330, dashed: true
  },
  // make → nocodb (write-back loop — curves above)
  {
    from: "make", to: "nocodb",
    label: "writes comms log",
    d: "M 539,225 C 539,185 319,185 319,225",
    lx: 400, ly: 172, dashed: false
  },
  // make → braze
  {
    from: "make", to: "braze",
    label: "Canvas enrollment API",
    d: "M 608,249 C 658,249 658,134 700,134",
    lx: 640, ly: 189, dashed: false
  },
  // make → segment
  {
    from: "make", to: "segment",
    label: "fires events",
    d: "M 539,273 C 539,340 319,340 319,390",
    lx: 415, ly: 330, dashed: false
  },
  // hubspot → make
  {
    from: "hubspot", to: "make",
    label: "deal stage trigger",
    d: "M 528,78 L 528,225",
    lx: 505, ly: 150, dashed: false
  },
  // make → hubspot (triggers workflows & sends emails via API)
  {
    from: "make", to: "hubspot",
    label: "triggers workflows & emails",
    d: "M 552,225 L 552,78",
    lx: 592, ly: 150, dashed: false
  },
  // hubspot → braze
  {
    from: "hubspot", to: "braze",
    label: "deal & contact data",
    d: "M 608,54 C 680,54 700,110 769,110",
    lx: 666, ly: 66, dashed: false
  },
  // segment → braze
  {
    from: "segment", to: "braze",
    label: "user events & profiles",
    d: "M 388,400 C 580,400 580,158 700,134",
    lx: 528, ly: 268, dashed: false
  },
  // braze → app
  {
    from: "braze", to: "app",
    label: "push (SDK)",
    d: "M 749,158 L 749,360",
    lx: 758, ly: 258, dashed: false
  },
  // app → segment (app events — curves back under)
  {
    from: "app", to: "segment",
    label: "app events",
    d: "M 700,393 C 555,410 420,425 388,420",
    lx: 538, ly: 426, dashed: true
  },
  // braze → customer (transactional email)
  {
    from: "braze", to: "customer",
    label: "transactional email",
    d: "M 838,128 C 900,128 920,210 920,240",
    lx: 908, ly: 178, dashed: false
  },
  // hubspot → customer (marketing email)
  {
    from: "hubspot", to: "customer",
    label: "marketing email",
    d: "M 608,42 C 820,20 985,145 985,240",
    lx: 815, ly: 38, dashed: false
  },
  // make → sendgrid
  {
    from: "make", to: "sendgrid",
    label: "triggers send",
    d: "M 539,273 L 539,420",
    lx: 550, ly: 350, dashed: false
  },
  // sendgrid → customer (attachment email)
  {
    from: "sendgrid", to: "customer",
    label: "attachment email",
    d: "M 608,444 C 800,444 920,390 920,288",
    lx: 790, ly: 433, dashed: false
  },
  // app → customer (receives push)
  {
    from: "app", to: "customer",
    label: "receives push",
    d: "M 838,384 C 895,384 920,348 920,288",
    lx: 898, ly: 366, dashed: false
  },
];

const svg = document.getElementById("diagram");
let selectedNode = null;

// ─── Arrowhead markers ────────────────────────────────────────────────────────
const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

function makeMarker(id, color) {
  const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
  marker.setAttribute("id", id);
  marker.setAttribute("markerWidth", "8");
  marker.setAttribute("markerHeight", "6");
  marker.setAttribute("refX", "7");
  marker.setAttribute("refY", "3");
  marker.setAttribute("orient", "auto");
  const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  poly.setAttribute("points", "0 0, 8 3, 0 6");
  poly.setAttribute("fill", color);
  marker.appendChild(poly);
  defs.appendChild(marker);
}

// one marker per source node
nodes.forEach(n => makeMarker("arrow-" + n.id, n.color));
svg.appendChild(defs);

// ─── Background ───────────────────────────────────────────────────────────────
const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
bg.setAttribute("width", "1080"); bg.setAttribute("height", "520");
bg.setAttribute("fill", "#FAFBFC"); bg.setAttribute("rx", "10");
svg.appendChild(bg);

// column dividers (subtle)
[220, 445, 675, 905].forEach(x => {
  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", x); line.setAttribute("y1", 16);
  line.setAttribute("x2", x); line.setAttribute("y2", 504);
  line.setAttribute("stroke", "#E8E8E8"); line.setAttribute("stroke-width", "1");
  line.setAttribute("stroke-dasharray", "4,4");
  svg.appendChild(line);
});

// column labels
const colLabels = [
  { x: 99,  label: "Data Sources" },
  { x: 319, label: "Data Layer" },
  { x: 539, label: "CRM & Automation" },
  { x: 769, label: "Engagement" },
  { x: 985, label: "Customer" },
];
colLabels.forEach(({ x, label }) => {
  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.setAttribute("x", x); t.setAttribute("y", "14");
  t.setAttribute("text-anchor", "middle");
  t.setAttribute("font-size", "9");
  t.setAttribute("font-weight", "600");
  t.setAttribute("letter-spacing", "0.08em");
  t.setAttribute("fill", "#BBBBC0");
  t.setAttribute("font-family", "Inter, system-ui, sans-serif");
  t.setAttribute("text-transform", "uppercase");
  t.textContent = label.toUpperCase();
  svg.appendChild(t);
});

// ─── Edges ────────────────────────────────────────────────────────────────────
const edgeEls = [];

edges.forEach(e => {
  const sourceNode = nodeById[e.from];
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "edge");
  g.setAttribute("data-from", e.from);
  g.setAttribute("data-to", e.to);

  // path
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", e.d);
  path.setAttribute("fill", "none");
  path.setAttribute("stroke", sourceNode.color);
  path.setAttribute("stroke-width", "1.8");
  path.setAttribute("stroke-opacity", "0.6");
  path.setAttribute("marker-end", `url(#arrow-${e.from})`);
  if (e.dashed) path.setAttribute("stroke-dasharray", "5,3");

  // label background
  const lbg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  lbg.setAttribute("fill", "white");
  lbg.setAttribute("rx", "3");
  lbg.setAttribute("opacity", "0.85");

  // label text
  const lt = document.createElementNS("http://www.w3.org/2000/svg", "text");
  lt.setAttribute("x", e.lx); lt.setAttribute("y", e.ly);
  lt.setAttribute("text-anchor", "middle");
  lt.setAttribute("font-size", "9.5");
  lt.setAttribute("fill", sourceNode.color);
  lt.setAttribute("font-family", "Inter, system-ui, sans-serif");
  lt.setAttribute("font-weight", "500");
  lt.textContent = e.label;

  g.appendChild(path);
  g.appendChild(lbg);
  g.appendChild(lt);
  svg.appendChild(g);

  edgeEls.push({ el: g, pathEl: path, labelEl: lt, lbgEl: lbg, edge: e });
});

// size label backgrounds after rendering
setTimeout(() => {
  edgeEls.forEach(({ labelEl, lbgEl }) => {
    try {
      const bb = labelEl.getBBox();
      lbgEl.setAttribute("x", bb.x - 3);
      lbgEl.setAttribute("y", bb.y - 1);
      lbgEl.setAttribute("width", bb.width + 6);
      lbgEl.setAttribute("height", bb.height + 2);
    } catch(e) {}
  });
}, 50);

// ─── Nodes ────────────────────────────────────────────────────────────────────
const nodeEls = {};
const tooltip = document.getElementById("tooltip");

nodes.forEach(n => {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "node");
  g.setAttribute("data-id", n.id);
  g.style.cursor = "pointer";

  // drop shadow
  const shadow = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  shadow.setAttribute("x", n.x + 2); shadow.setAttribute("y", n.y + 3);
  shadow.setAttribute("width", n.w); shadow.setAttribute("height", n.h);
  shadow.setAttribute("rx", "8"); shadow.setAttribute("fill", "rgba(0,0,0,0.06)");

  // main rect
  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  rect.setAttribute("x", n.x); rect.setAttribute("y", n.y);
  rect.setAttribute("width", n.w); rect.setAttribute("height", n.h);
  rect.setAttribute("rx", "8");
  rect.setAttribute("fill", n.bg);
  rect.setAttribute("stroke", n.color);
  rect.setAttribute("stroke-width", "1.8");

  // label
  const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
  label.setAttribute("x", n.cx); label.setAttribute("y", n.cy - 6);
  label.setAttribute("text-anchor", "middle");
  label.setAttribute("font-size", "12"); label.setAttribute("font-weight", "700");
  label.setAttribute("fill", n.color);
  label.setAttribute("font-family", "Inter, system-ui, sans-serif");
  label.textContent = n.label;

  // sub
  const sub = document.createElementNS("http://www.w3.org/2000/svg", "text");
  sub.setAttribute("x", n.cx); sub.setAttribute("y", n.cy + 10);
  sub.setAttribute("text-anchor", "middle");
  sub.setAttribute("font-size", "9.5"); sub.setAttribute("fill", "#888");
  sub.setAttribute("font-family", "Inter, system-ui, sans-serif");
  sub.textContent = n.sub;

  g.appendChild(shadow);
  g.appendChild(rect);
  g.appendChild(label);
  g.appendChild(sub);
  svg.appendChild(g);

  nodeEls[n.id] = { g, rect, labelEl: label, node: n };

  // interactions
  g.addEventListener("click", () => handleNodeClick(n.id));
  g.addEventListener("mouseenter", (evt) => {
    tooltip.style.display = "block";
    tooltip.innerHTML = `<strong>${n.label}</strong><br>${n.details}`;
  });
  g.addEventListener("mousemove", (evt) => {
    tooltip.style.left = (evt.clientX + 14) + "px";
    tooltip.style.top  = (evt.clientY - 10) + "px";
  });
  g.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
  });
});

// ─── Interaction ──────────────────────────────────────────────────────────────
function handleNodeClick(id) {
  if (selectedNode === id) {
    selectedNode = null;
    resetHighlight();
  } else {
    selectedNode = id;
    applyHighlight(id);
  }
}

function resetHighlight() {
  Object.values(nodeEls).forEach(({ rect, node }) => {
    rect.setAttribute("fill", node.bg);
    rect.setAttribute("stroke-width", "1.8");
    rect.setAttribute("opacity", "1");
  });
  edgeEls.forEach(({ pathEl, labelEl, lbgEl }) => {
    pathEl.setAttribute("stroke-opacity", "0.6");
    pathEl.setAttribute("stroke-width", "1.8");
    labelEl.setAttribute("opacity", "1");
    lbgEl.setAttribute("opacity", "0.85");
  });
}

function applyHighlight(id) {
  const connectedIds = new Set([id]);
  edgeEls.forEach(({ edge }) => {
    if (edge.from === id || edge.to === id) {
      connectedIds.add(edge.from);
      connectedIds.add(edge.to);
    }
  });

  Object.values(nodeEls).forEach(({ rect, node }) => {
    const active = connectedIds.has(node.id);
    rect.setAttribute("fill", active ? node.bg : "#F5F5F5");
    rect.setAttribute("stroke-width", node.id === id ? "3" : "1.8");
    rect.setAttribute("opacity", active ? "1" : "0.3");
  });

  edgeEls.forEach(({ pathEl, labelEl, lbgEl, edge }) => {
    const active = edge.from === id || edge.to === id;
    pathEl.setAttribute("stroke-opacity", active ? "1" : "0.08");
    pathEl.setAttribute("stroke-width", active ? "2.5" : "1.8");
    labelEl.setAttribute("opacity", active ? "1" : "0");
    lbgEl.setAttribute("opacity", active ? "0.95" : "0");
  });
}
</script>
</body>
</html>
